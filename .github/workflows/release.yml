name: Zyro Release

on:
  workflow_dispatch:


permissions:
  contents: write



jobs:

  release:

    name: Build Zyro Signed APK

    runs-on: ubuntu-latest



    steps:


      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Surgical Clean
        run: |
          find . -name "build" -type d -exec rm -rf {} +
          chmod -R 777 .

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build Release
        run: |
          # Força o Gradle a usar diretórios locais para build e cache
          ./gradlew clean assembleRelease --stacktrace --debug --no-build-cache -Dorg.gradle.parallel=false -Dorg.gradle.user.home=$PWD/.gradle_user_home > build_log.txt 2>&1







      - name: Prepare APK

        run: |

          mkdir -p release


          APK=$(find app/build/outputs/apk/release \
          -name "*.apk" | head -1)



          if [ -z "$APK" ]; then

            echo "❌ APK not found"

            exit 1

          fi



          cp "$APK" release/Zyro.apk



          ls -lh release/Zyro.apk






      - name: Verify APK Signature

        run: |

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)



          "$BUILD_TOOLS/apksigner" verify \
          --verbose \
          release/Zyro.apk



          echo "✅ APK signed"






      - name: Commit Version

        run: |

          git config user.name "Zyro Bot"

          git config user.email "actions@github.com"



          git add gradle/libs.versions.toml



          git commit \
          -m "Update Zyro version" || exit 0



          git push






      - name: Create GitHub Release

        uses: softprops/action-gh-release@v2


        with:

          tag_name: "beta-${{ github.run_number }}"

          name: "Zyro Beta ${{ github.run_number }}"

          body: |

            🚀 Zyro Beta Update

            Signed APK generated automatically.


          files: |

            release/Zyro.apk


        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
