name: Zyro Release

on:
  workflow_dispatch:

permissions:
  contents: write


jobs:

  release:

    name: Build Signed APK
    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0



      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle



      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4



      - name: Check Secrets
        run: |

          echo "Verificando secrets..."

          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ KEYSTORE_BASE64 faltando"
            exit 1
          fi

          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "❌ KEY_ALIAS faltando"
            exit 1
          fi

          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "❌ KEYSTORE_PASSWORD faltando"
            exit 1
          fi

          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "❌ KEY_PASSWORD faltando"
            exit 1
          fi


          echo "✅ Secrets encontrados"



      - name: Update Version Code
        run: |

          python3 <<'PY'

          import re

          file="gradle/libs.versions.toml"

          data=open(file).read()


          match=re.search(
              r'version-code\s*=\s*"(\d+)"',
              data
          )


          if not match:
              raise Exception("version-code não encontrado")


          old=int(match.group(1))
          new=old+1


          data=re.sub(
              r'version-code\s*=\s*"\d+"',
              f'version-code = "{new}"',
              data
          )


          open(file,"w").write(data)


          print(f"Version {old} -> {new}")

          PY



      - name: Import Keystore
        run: |

          echo "${{ secrets.KEYSTORE_BASE64 }}" \
          | base64 --decode > zyro-release.keystore


          if [ ! -s zyro-release.keystore ]; then
            echo "❌ Keystore inválido"
            exit 1
          fi


          echo "✅ Keystore carregado"



      - name: Validate Keystore
        run: |

          keytool -list \
          -keystore zyro-release.keystore \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -alias "${{ secrets.KEY_ALIAS }}"


          echo "✅ Alias válido"



      - name: Clean Project
        run: |

          chmod +x gradlew
          ./gradlew clean



      - name: Build Release APK
        run: |

          ./gradlew assembleRelease



      - name: Sign APK
        run: |

          mkdir -p release


          APK=$(find app/build/outputs/apk/release \
          -name "*.apk" | head -1)


          if [ ! -f "$APK" ]; then
            echo "❌ APK não encontrado"
            exit 1
          fi


          echo "APK encontrado:"
          ls -lh "$APK"



          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)


          "$BUILD_TOOLS/apksigner" sign \
          --ks zyro-release.keystore \
          --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out release/Zyro.apk \
          "$APK"



      - name: Verify APK Signature
        run: |

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)


          "$BUILD_TOOLS/apksigner" verify \
          --verbose \
          release/Zyro.apk



      - name: Commit Version Update
        run: |

          git config user.name "Zyro Bot"
          git.config user.email "actions@github.com"

          git add gradle/libs.versions.toml

          git commit -m "Increase version code" || true

          git push || true



      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:

          tag_name: v${{ github.run_number }}

          name: Zyro Beta v${{ github.run_number }}

          body: |
            🚀 Zyro Beta Update

            Automatic build from GitHub Actions.

          files: |
            release/Zyro.apk

          generate_release_notes: true


        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
