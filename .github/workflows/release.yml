name: Zyro Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Update Version Code
        run: |
          python3 <<'PY'
          import re

          file = "gradle/libs.versions.toml"

          with open(file, "r") as f:
              data = f.read()

          match = re.search(r'version-code\s*=\s*"(\d+)"', data)

          if not match:
              print("version-code not found")
              exit(0)

          old = int(match.group(1))
          new = old + 1

          data = re.sub(
              r'version-code\s*=\s*"\d+"',
              f'version-code = "{new}"',
              data
          )

          with open(file, "w") as f:
              f.write(data)

          print(f"Version {old} -> {new}")
          PY

      - name: Clean Project
        run: |
          chmod +x gradlew
          ./gradlew clean

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease

      - name: Prepare APK
        run: |
          mkdir -p release

          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          cp "$APK" release/Zyro.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Zyro Update v${{ github.run_number }}
          files: release/Zyro.apk
          generate_release_notes: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
