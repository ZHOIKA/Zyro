name: Zyro Release

on:
  workflow_dispatch:


permissions:
  contents: write



jobs:

  release:

    name: Build Zyro Signed APK

    runs-on: ubuntu-latest



    steps:


      - name: Checkout

        uses: actions/checkout@v4

        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}




      - name: Setup Java 17

        uses: actions/setup-java@v4

        with:

          distribution: temurin

          java-version: 17

          cache: gradle




      - name: Setup Gradle

        uses: gradle/actions/setup-gradle@v4





      - name: Check Secrets

        shell: bash

        run: |

          echo "🔍 Checking secrets"


          for secret in \
          KEYSTORE_BASE64 \
          KEY_ALIAS \
          KEYSTORE_PASSWORD \
          KEY_PASSWORD

          do

            if [ -z "${!secret}" ]; then
              echo "❌ Missing $secret"
              exit 1
            fi

          done


          echo "✅ Secrets OK"


        env:

          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}






      - name: Create Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
          | base64 --decode \
          > "$GITHUB_WORKSPACE/zyro-release.keystore"

          ls -l "$GITHUB_WORKSPACE/zyro-release.keystore"
          test -s "$GITHUB_WORKSPACE/zyro-release.keystore"
          echo "✅ Keystore created at $GITHUB_WORKSPACE/zyro-release.keystore"

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=zyro-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

          echo "✅ keystore.properties created"






      - name: Validate Keystore

        run: |

          keytool -list \
          -keystore zyro-release.keystore \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -alias "${{ secrets.KEY_ALIAS }}"


          echo "✅ Alias valid"






      - name: Update Version Code

        run: |

          python3 <<'PY'

          import re


          file="gradle/libs.versions.toml"


          data=open(file).read()


          match=re.search(
              r'version-code\s*=\s*"(\d+)"',
              data
          )


          if not match:
              raise Exception(
                  "version-code not found"
              )


          old=int(match.group(1))

          new=old+1



          data=re.sub(
              r'version-code\s*=\s*"\d+"',
              f'version-code = "{new}"',
              data
          )


          open(file,"w").write(data)


          print(
              f"Version {old} -> {new}"
          )

          PY






      - name: Build Release
        run: |
          chmod -R 777 .
          ./gradlew clean assembleRelease --stacktrace --debug --no-build-cache -Dorg.gradle.parallel=false > build_log.txt 2>&1

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build_log.txt






      - name: Prepare APK

        run: |

          mkdir -p release


          APK=$(find app/build/outputs/apk/release \
          -name "*.apk" | head -1)



          if [ -z "$APK" ]; then

            echo "❌ APK not found"

            exit 1

          fi



          cp "$APK" release/Zyro.apk



          ls -lh release/Zyro.apk






      - name: Verify APK Signature

        run: |

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)



          "$BUILD_TOOLS/apksigner" verify \
          --verbose \
          release/Zyro.apk



          echo "✅ APK signed"






      - name: Commit Version

        run: |

          git config user.name "Zyro Bot"

          git config user.email "actions@github.com"



          git add gradle/libs.versions.toml



          git commit \
          -m "Update Zyro version" || exit 0



          git push






      - name: Create GitHub Release

        uses: softprops/action-gh-release@v2


        with:

          tag_name: "beta-${{ github.run_number }}"

          name: "Zyro Beta ${{ github.run_number }}"

          body: |

            🚀 Zyro Beta Update

            Signed APK generated automatically.


          files: |

            release/Zyro.apk


        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
