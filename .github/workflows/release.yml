name: Zyro Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/zyro-release.keystore

      - name: Create signing config
        run: |
          cat > keystore.properties <<EOF
          storeFile=zyro-release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Update Version Code
        run: |
          python3 <<'PY'
          import re

          file="gradle/libs.versions.toml"

          with open(file) as f:
              data=f.read()

          old=re.search(r'version-code\s*=\s*"(\d+)"',data)

          if old:
              new=int(old.group(1))+1
              data=re.sub(
                  r'version-code\s*=\s*"\d+"',
                  f'version-code = "{new}"',
                  data
              )

              with open(file,"w") as f:
                  f.write(data)

              print("Version code:",new)
          PY

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          mkdir release

          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          $ANDROID_HOME/build-tools/*/apksigner sign \
          --ks app/zyro-release.keystore \
          --ks-key-alias ${{ secrets.KEY_ALIAS }} \
          --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
          --key-pass pass:${{ secrets.KEY_PASSWORD }} \
          "$APK"

          cp "$APK" release/Zyro.apk


      - name: Verify Signature
        run: |
          $ANDROID_HOME/build-tools/*/apksigner verify --verbose release/Zyro.apk


      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Zyro Update v${{ github.run_number }}
          files: release/Zyro.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
