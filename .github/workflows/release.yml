name: Zyro Release

on:
  workflow_dispatch:

permissions:
  contents: write


jobs:

  release:

    name: Build Zyro APK
    runs-on: ubuntu-latest


    steps:


      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0



      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle



      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4



      - name: Check Secrets
        run: |

          test -n "${{ secrets.KEYSTORE_BASE64 }}" || exit 1
          test -n "${{ secrets.KEY_ALIAS }}" || exit 1
          test -n "${{ secrets.KEYSTORE_PASSWORD }}" || exit 1
          test -n "${{ secrets.KEY_PASSWORD }}" || exit 1

          echo "✅ Secrets OK"



      - name: Import Keystore
        run: |

          echo "${{ secrets.KEYSTORE_BASE64 }}" \
          | base64 --decode > zyro-release.keystore


          test -s zyro-release.keystore

          echo "✅ Keystore criado"



      - name: Validate Keystore
        run: |

          keytool -list \
          -keystore zyro-release.keystore \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -alias "${{ secrets.KEY_ALIAS }}"

          echo "✅ Chave válida"



      - name: Update Version Code
        run: |

          python3 <<'PY'

          import re

          file="gradle/libs.versions.toml"

          data=open(file).read()


          old=re.search(
              r'version-code\s*=\s*"(\d+)"',
              data
          ).group(1)


          new=str(int(old)+1)


          data=re.sub(
              r'version-code\s*=\s*"\d+"',
              f'version-code = "{new}"',
              data
          )


          open(file,"w").write(data)

          print(old,"->",new)

          PY



      - name: Build Release APK
        env:

          KEYSTORE_FILE: ${{ github.workspace }}/zyro-release.keystore

          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}


        run: |

          chmod +x gradlew

          ./gradlew clean

          ./gradlew assembleRelease



      - name: Prepare APK
        run: |

          mkdir release


          APK=$(find app/build/outputs/apk/release \
          -name "*.apk" | head -1)


          if [ ! -f "$APK" ]; then

            echo "APK não encontrado"

            exit 1

          fi


          cp "$APK" release/Zyro.apk


          echo "APK:"
          ls -lh release/Zyro.apk



      - name: Verify Signature
        run: |

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)


          "$BUILD_TOOLS/apksigner" verify \
          --verbose \
          release/Zyro.apk


          echo "✅ APK assinado"



      - name: Commit Version
        run: |

          git config user.name "Zyro Bot"

          git config user.email "actions@github.com"


          git add gradle/libs.versions.toml


          git commit \
          -m "Increase Zyro version" || true


          git push || true



      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:

          tag_name: v${{ github.run_number }}

          name: Zyro Beta v${{ github.run_number }}

          body: |

            🚀 Zyro Beta Update

            Signed APK build.

          files:

            release/Zyro.apk


          generate_release_notes: true


        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
