name: Zyro Release

on:
  workflow_dispatch:

permissions:
  contents: write


jobs:

  release:

    name: Build Zyro APK
    runs-on: ubuntu-latest


    steps:


      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0



      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle



      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4



      - name: Check Secrets
        run: |

          echo "Checking secrets..."

          test -n "${{ secrets.KEYSTORE_BASE64 }}" || exit 1
          test -n "${{ secrets.KEY_ALIAS }}" || exit 1
          test -n "${{ secrets.KEYSTORE_PASSWORD }}" || exit 1
          test -n "${{ secrets.KEY_PASSWORD }}" || exit 1

          echo "✅ Secrets OK"



      - name: Create Keystore
        run: |

          echo "${{ secrets.KEYSTORE_BASE64 }}" \
          | base64 -d > zyro-release.keystore


          if [ ! -s zyro-release.keystore ]; then
            echo "Keystore inválido"
            exit 1
          fi


          echo "✅ Keystore criado"



      - name: Create keystore.properties
        run: |

          echo "storeFile=zyro-release.keystore" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties


          cat keystore.properties | sed 's/=.*/=***/'



      - name: Validate Key
        run: |

          keytool -list \
          -keystore zyro-release.keystore \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -alias "${{ secrets.KEY_ALIAS }}"


          echo "✅ Chave válida"



      - name: Update Version Code
        run: |

          python3 <<'PY'

          import re

          file="gradle/libs.versions.toml"

          data=open(file).read()


          match=re.search(
              r'version-code\s*=\s*"(\d+)"',
              data
          )


          if not match:
              raise Exception("version-code não encontrado")


          old=int(match.group(1))
          new=old+1


          data=re.sub(
              r'version-code\s*=\s*"\d+"',
              f'version-code = "{new}"',
              data
          )


          open(file,"w").write(data)


          print(f"{old} -> {new}")

          PY



      - name: Build Release APK
        run: |

          chmod +x gradlew

          ./gradlew clean assembleRelease



      - name: Prepare APK
        run: |

          mkdir -p release


          APK=$(find app/build/outputs/apk/release \
          -name "*.apk" | head -1)


          if [ ! -f "$APK" ]; then
            echo "APK não encontrado"
            exit 1
          fi


          cp "$APK" release/Zyro.apk


          ls -lh release/Zyro.apk



      - name: Verify APK
        run: |

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)


          "$BUILD_TOOLS/apksigner" verify \
          --verbose \
          release/Zyro.apk


          echo "✅ APK assinado"



      - name: Save Version Change
        run: |

          git config user.name "Zyro Bot"
          git config user.email "actions@github.com"


          git add gradle/libs.versions.toml


          git commit -m "Update Zyro version" || echo "No changes"


          git push || echo "Push skipped"



      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:

          tag_name: beta-${{ github.run_number }}

          name: Zyro Beta ${{ github.run_number }}

          body: |
            🚀 Zyro Beta Update

            Automated signed APK build.

          files: |
            release/Zyro.apk


        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
