name: Build Zyro APK

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'metadata/**'

  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'metadata/**'

  workflow_dispatch:

jobs:
  build:
    name: Build Apk
    runs-on: ubuntu-latest

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.5.0
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Auto increment version code
        run: |
          python3 - <<'PY'
          import re

          path = "gradle/libs.versions.toml"

          with open(path, "r") as f:
              data = f.read()

          match = re.search(r'version-code\s*=\s*"(\d+)"', data)

          if match:
              old = int(match.group(1))
              new = old + 1

              data = re.sub(
                  r'version-code\s*=\s*"\d+"',
                  f'version-code = "{new}"',
                  data
              )

              with open(path, "w") as f:
                  f.write(data)

              print(f"Version code: {old} -> {new}")
          else:
              print("version-code not found")
          PY

      - name: Assemble Debug
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/*.apk
